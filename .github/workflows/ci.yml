#
#      - name: Set up Go
#        uses: actions/setup-go@v5
#        with:
#          go-version: '1.25'
#          cache: true
#          cache-dependency-path: go.sum
#
#      - name: Run golangci-lint
#        uses: golangci/golangci-lint-action@v4
#        with:
#          version: v2.4.0
#          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Run govulncheck
        # govulncheck checks the actual call graph, not just the module graph —
        # much lower false-positive rate than pure dependency scanners.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Calculate coverage
        id: coverage
        run: |
          total=$(go tool cover -func=coverage.out | grep total | grep -Eo '[0-9]+\.[0-9]+')
          total_integer=${total%.*}
          echo "total=${total}" >> "${GITHUB_OUTPUT}"
          echo "total_integer=${total_integer}" >> "${GITHUB_OUTPUT}"
          echo "Coverage: ${total}%"

      - name: Enforce coverage threshold
        if: matrix.go-version == '1.25.x'
        run: |
          total="${{ steps.coverage.outputs.total_integer }}"
          if [ "$total" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
            echo "::error::Coverage ${total}% is below the required threshold of ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "Coverage ${total}% meets the threshold of ${{ env.COVERAGE_THRESHOLD }}%"
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.go-version == '1.25.x'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## Code Coverage Report
            Coverage: **${{ steps.coverage.outputs.total }}%** (threshold: ${{ env.COVERAGE_THRESHOLD }}%)
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.25.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum
      - name: Run integration tests
        run: go test -v -race -tags integration -timeout 60s ./internal/api/...
        env:
          # Integration tests use these to construct real JWTs
          JWT_SECRET: "a-test-secret-that-is-exactly-32-bytes-long"
          JWT_ISSUER: "synapse-platform"
          JWT_AUDIENCE: "synapse-api"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Ignore specific rules if you have justified exceptions.
          # ignore: DL3008,DL3009
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (validation only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: synapse-platform:ci
          # Export the build cache to GitHub's cache — speeds up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Validate docker-compose.yaml
        # docker compose config resolves all anchors, substitutions, and
        # extension fields, then validates the result against the spec.
        run: docker compose -f docker-compose.yaml config --quiet
      - name: Validate sqlc configuration
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc vet

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security, test, test-integration, docker, infra]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum
      - name: Build binary
        run: go build -v -ldflags="-w -s" -o bin/synapsePlatform ./cmd/main.go
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapsePlatform-binary
          path: bin/synapsePlatform
          retention-days: 7

      - name: Write CI summary
        if: always()
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Security scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | \`bin/synapsePlatform\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY