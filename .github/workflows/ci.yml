name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types:
      - synchronize
      - opened
      - ready_for_review
      - reopened

# Cancel in-flight runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 70

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high       # block PRs that add High/Critical CVEs
          deny-licenses: GPL-2.0, AGPL-3.0

#  lint:
