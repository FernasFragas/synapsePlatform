server:
  address: ":8080"
  timeouts:
    read_header: 5s
    read: 10s
    write: 30s
    idle: 120s
  shutdown:
    timeout: 10s
    grace_period: 5s
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "https://dashboard.example.com"
  rate_limit:
    requests_per_second: 10
    burst: 20

auth:
  jwt:
    issuer: "https://auth.example.com"
    audience: "synapse-platform-api"
    # more realistic would be an env var: ${JWT_SECRET}
    secret: "your-256-bit-secret-replace-me!!"

kafka:
  brokers:
    - "localhost:9092"
  group_id: "synapse-platform-consumer"
  topics:
    - "ingestion.raw"
  dlq_topic: "ingestion.dlq"
  min_bytes: 10000      # 10KB
  max_bytes: 10000000   # 10MB

database:
  path: "data.db"

log:
  redact_keys:
    - "token"
    - "password"
    - "secret"
    - "authorization"
  max_value_bytes: 512

# Print spans to stdout (for local debugging)
#tracing:
#  endpoint: "stdout"
# Send to Jaeger/Tempo/Collector via OTLP
tracing:
  endpoint: "http://localhost:4318/v1/traces"
# Disable tracing entirely (no-op, zero overhead)
#tracing:
#  endpoint: ""